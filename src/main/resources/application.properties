# ═══════════════════════════════════════════════════════════════
# application.properties — Stickman Arena Backend Config
# ═══════════════════════════════════════════════════════════════

server.port=${PORT:8080}

# JWT
jwt.secret=StickmanArena2025SecretKeyForJWTSigningMustBe256BitsLong!!
jwt.expiration=86400000

# CORS — cho phép frontend
stickman.cors.allowed-origins=http://localhost:3000,http://127.0.0.1:3000,http://localhost:5500,http://127.0.0.1:5500

# Game settings
stickman.game.max-rooms=50
stickman.game.match-timeout-ms=120000
stickman.game.ai-tick-ms=16
